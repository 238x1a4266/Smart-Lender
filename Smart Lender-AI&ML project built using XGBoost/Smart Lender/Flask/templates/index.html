<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lender</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#2563eb,#06b6d4);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.card{

background:white;

width:550px;

padding:35px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

h1{

text-align:center;

color:#1e293b;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:25px;

}

input,select{

width:100%;

padding:12px;

margin-bottom:14px;

border-radius:8px;

border:1px solid #cbd5e1;

font-size:15px;

}

input:focus,
select:focus{

outline:none;

border-color:#2563eb;

}

button{

width:100%;

padding:14px;

background:#2563eb;

color:white;

font-size:17px;

border:none;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

footer{

margin-top:20px;

text-align:center;

color:#64748b;

font-size:13px;

}

</style>

</head>

<body>

<div class="card">

<h1>🏦 Smart Lender</h1>

<p class="subtitle">
AI-Based Loan Approval Prediction
</p>

<form action="/predict" method="POST">

<select name="Gender" required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select name="Married" required>
<option value="">Marital Status</option>
<option>Yes</option>
<option>No</option>
</select>

<select name="Dependents" required>
<option value="">Dependents</option>
<option>0</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>

<select name="Education" required>
<option value="">Education</option>
<option>Graduate</option>
<option>Not Graduate</option>
</select>

<select name="Self_Employed" required>
<option value="">Self Employed</option>
<option>No</option>
<option>Yes</option>
</select>

<input type="number" min="0" name="ApplicantIncome" placeholder="Applicant Income" required>

<input type="number" min="0" name="CoapplicantIncome" placeholder="Co-applicant Income" required>

<input type="number" min="0" name="LoanAmount" placeholder="Loan Amount" required>

<input type="number" min="0" name="Loan_Amount_Term" placeholder="Loan Amount Term" required>

<select name="Credit_History" required>
<option value="">Credit History</option>
<option value="1">Good</option>
<option value="0">Poor</option>
</select>

<select name="Property_Area" required>
<option value="">Property Area</option>
<option>Rural</option>
<option>Semiurban</option>
<option>Urban</option>
</select>

<button type="submit">

Predict Loan Status

</button>

</form>

<footer>

© 2026 Smart Lender | Flask + XGBoost

</footer>

</div>

</body>

</html>
