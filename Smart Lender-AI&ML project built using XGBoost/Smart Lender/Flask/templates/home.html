<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lender</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#2563eb,#06b6d4);

overflow:hidden;

}

.card{

width:700px;

background:white;

padding:50px;

border-radius:20px;

text-align:center;

box-shadow:0 25px 50px rgba(0,0,0,.25);

animation:fadeIn 1s ease;

}

h1{

font-size:48px;

color:#1e293b;

margin-bottom:10px;

}

h3{

color:#2563eb;

margin-bottom:25px;

font-weight:500;

}

p{

font-size:18px;

line-height:30px;

color:#64748b;

margin-bottom:35px;

}

button{

padding:15px 40px;

font-size:18px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

transform:scale(1.05);

}

.footer{

margin-top:35px;

font-size:14px;

color:#64748b;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<h1>🏦 Smart Lender</h1>

<h3>AI-Powered Loan Approval Prediction System</h3>

<p>

Smart Lender is an intelligent machine learning application
that predicts whether a loan should be approved based on
customer information using the XGBoost algorithm.

</p>

<a href="/application">

<button>

Get Started →

</button>

</a>

<div class="footer">

Powered by Flask • XGBoost • IBM Cloud

</div>

</div>

</body>

</html>
