<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Prediction Result</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Segoe UI',sans-serif;

}

body{

background:linear-gradient(135deg,#2563eb,#06b6d4);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

width:450px;

padding:40px;

text-align:center;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

h1{

margin-bottom:20px;

color:#1e293b;

}

.status{

font-size:70px;

margin-bottom:15px;

}

.message{

font-size:32px;

font-weight:bold;

margin-bottom:25px;

}

button{

padding:12px 25px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#1d4ed8;

}

footer{

margin-top:30px;

color:#64748b;

font-size:13px;

}

</style>

</head>

<body>

<div class="card">

<h1>🏦 Smart Lender</h1>

<div class="status">

{{ icon }}

</div>

<div class="message" style="color:{{ color }}">

{{ message }}

</div>

<a href="/application">

<button>

Predict Another Loan

</button>

</a>

<footer>

© 2026 Smart Lender | AI-Based Loan Approval Prediction

</footer>

</div>

</body>

</html>
